services:
  postgres:
    image: postgres:16-alpine
    container_name: polaris-postgres
    environment:
      POSTGRES_DB: polaris_exchange
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris -d polaris_exchange"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polaris-api
    ports:
      - "5008:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=polaris_exchange;Username=polaris;Password=polaris123"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../TradingSystem-Front
      dockerfile: Dockerfile
    container_name: polaris-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
